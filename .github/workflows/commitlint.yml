# Checks that every commit in a PR follows the conventional-commits spec.
# Runs alongside the pre-commit hook as a belt-and-suspenders check — the
# hook runs locally on the author's machine; this runs server-side so it
# can't be bypassed.

name: Commitlint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Check commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
