# Scans every PR for accidentally committed secrets (API keys, tokens,
# private keys, .env contents, etc.). Uses gitleaks with its default ruleset.
# Free for public repos under the gitleaks license.
#
# This is enforcement for "Rule: never commit secrets" in CLAUDE.md.

name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits in the PR
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
