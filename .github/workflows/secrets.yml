# Scans every PR for accidentally committed secrets (API keys, tokens,
# private keys, .env contents, etc.). Uses TruffleHog with verified-only
# detection (no noisy false positives — only secrets it can prove are valid).
# Free for public and private repos.
#
# This is enforcement for "Rule 6: never expose API keys" in CLAUDE.md.

name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so we can scan the entire diff range, not just HEAD.
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          # Scan the full PR diff. For pushes to main, scan only the new commits.
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.event.after }}
          extra_args: --results=verified,unknown
